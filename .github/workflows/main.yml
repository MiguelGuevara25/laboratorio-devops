name: Deploy to VPS

on:
  push:
    branches:
      - qa
      - prd

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Compilar proyecto
        run: mvn clean package -DskipTests

      - name: Guardar artefacto
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar

  docker:
    name: Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Descargar artefacto
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Mover JAR junto al Dockerfile
        run: cp target/hola-mundo-api-1.0.0.jar hola-mundo-api-1.0.0.jar

      - name: Construir imagen Docker
        run: docker build -t hola-mundo-api:latest .

      - name: Copiar artefactos al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "hola-mundo-api-1.0.0.jar,Dockerfile"
          target: "/home/app/hola-mundo-api"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Configurar variables de ambiente
        run: |
          if [ "${{ github.ref_name }}" == "qa" ]; then
            echo "PROFILE=qa" >> $GITHUB_ENV
            echo "PORT=8083" >> $GITHUB_ENV
            echo "CONTAINER=hola-mundo-api-qa" >> $GITHUB_ENV
          else
            echo "PROFILE=prd" >> $GITHUB_ENV
            echo "PORT=8081" >> $GITHUB_ENV
            echo "CONTAINER=hola-mundo-api-prd" >> $GITHUB_ENV
          fi

      - name: Desplegar contenedor en VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: PROFILE,PORT,CONTAINER
          script: |
            cd /home/app/hola-mundo-api
            docker build -t hola-mundo-api-$PROFILE:latest .
            docker stop $CONTAINER || true
            docker rm $CONTAINER || true
            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              -p $PORT:8080 \
              -e SPRING_PROFILES_ACTIVE=$PROFILE \
              hola-mundo-api-$PROFILE:latest
            docker image prune -f
